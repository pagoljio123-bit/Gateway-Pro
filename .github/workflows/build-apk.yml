name: Build Android APK
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK File
        run: |
          cordova create gateway_app com.secret.gateway "Gateway Pro"
          cp index.html gateway_app/www/index.html
          cd gateway_app
          cordova platform add android
          cordova build android

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Gateway-Pro-APK
          path: gateway_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
